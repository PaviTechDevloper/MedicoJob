apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/PaviTechDevloper/MedicoJob.git
    targetRevision: main
    path: opslora-helm/apps/frontend
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
