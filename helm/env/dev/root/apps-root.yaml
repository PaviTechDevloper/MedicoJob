apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-apps-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/PaviTechDevloper/MedicoJob.git
    targetRevision: main
    path: opslora-helm/env/dev/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
