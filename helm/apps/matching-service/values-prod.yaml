namespace: prod
name: matching-service
replicaCount: 2
image:
  repository: pavithrasambath2003/matching-service
  tag: v1
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 5003
containerPort: 5003
env:
  PORT: "5003"
httpRoute:
  enabled: true
  gatewayName: medicojob-gateway
  paths:
    - /match
serviceAccount:
  create: true
job:
  enabled: false
