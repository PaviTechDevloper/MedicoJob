namespace: dev
name: reputation-service
replicaCount: 1
image:
  repository: ghcr.io/pavitechdevloper/pavitechdevloper.reputation_service
  tag: latest
  pullPolicy: IfNotPresent
imagePullSecrets: []
service:
  type: ClusterIP
  port: 5006
containerPort: 5006
configMap:
  enabled: true
  name: medicojob-config
secret:
  enabled: true
  name: medicojob-secrets
env:
  PORT: "5006"
httpRoute:
  enabled: true
  gatewayName: medicojob-gateway
  paths:
    - /reviews
serviceAccount:
  create: true
job:
  enabled: false
