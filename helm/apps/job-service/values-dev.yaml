namespace: dev
name: job-service
replicaCount: 1
image:
  repository: pavithrasambath2003/job-service
  tag: v1
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 5002
containerPort: 5002
env:
  PORT: "5002"
httpRoute:
  enabled: true
  gatewayName: medicojob-gateway
  paths:
    - /jobs
    - /socket.io
serviceAccount:
  create: true
job:
  enabled: false
