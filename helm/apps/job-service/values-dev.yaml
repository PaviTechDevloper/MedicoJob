namespace: dev
name: job-service
replicaCount: 1
image:
  repository: ghcr.io/pavitechdevloper/pavitechdevloper.job_service
  tag: latest
  pullPolicy: IfNotPresent
imagePullSecrets: []
service:
  type: ClusterIP
  port: 5002
containerPort: 5002
configMap:
  enabled: true
  name: medicojob-config
secret:
  enabled: true
  name: medicojob-secrets
env:
  PORT: "5002"
httpRoute:
  enabled: true
  gatewayName: medicojob-gateway
  paths:
    - /jobs
    - /socket.io
serviceAccount:
  create: true
job:
  enabled: false
