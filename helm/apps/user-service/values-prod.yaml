namespace: prod
name: user-service
replicaCount: 2
image:
  repository: ghcr.io/pavitechdevloper/pavitechdevloper.user_service
  tag: latest
  pullPolicy: IfNotPresent
imagePullSecrets: []
service:
  type: ClusterIP
  port: 5001
containerPort: 5001
configMap:
  enabled: true
  name: medicojob-config
secret:
  enabled: true
  name: medicojob-secrets
env:
  PORT: "5001"
httpRoute:
  enabled: true
  gatewayName: medicojob-gateway
  paths:
    - /auth
serviceAccount:
  create: true
job:
  enabled: false
