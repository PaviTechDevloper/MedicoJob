{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.name }}-route
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: {{ .Values.httpRoute.gatewayName }}
  rules:
  {{- range .Values.httpRoute.paths }}
  - matches:
    - path:
        type: PathPrefix
        value: {{ . | quote }}
    backendRefs:
    - name: {{ $.Values.name }}
      port: {{ $.Values.service.port }}
  {{- end }}
{{- end }}
