version: '3.8'

services:
  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    env_file:
      - .env

  user-service:
    build: ./backend/user-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    env_file:
      - .env

  job-service:
    build: ./backend/job-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
    env_file:
      - .env

  matching-service:
    build: ./backend/matching-service
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
    env_file:
      - .env

  availability-service:
    build: ./backend/availability-service
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
    env_file:
      - .env

  location-service:
    build: ./backend/location-service
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
    env_file:
      - .env

  reputation-service:
    build: ./backend/reputation-service
    ports:
      - "5006:5006"
    environment:
      - PORT=5006
    env_file:
      - .env

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    env_file:
      - .env
    stdin_open: true
    tty: true
