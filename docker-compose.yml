version: '3.8'

services:
  api-gateway:
    container_name: api-gateway-container
    build: ./backend/api-gateway
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    env_file:
      - .env
    restart: always

  user-service:
    container_name: user-service-container
    build: ./backend/user-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
    env_file:
      - .env
    restart: always

  job-service:
    container_name: job-service-container
    build: ./backend/job-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
    env_file:
      - .env
    restart: always

  matching-service:
    container_name: matching-service-container
    build: ./backend/matching-service
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
    env_file:
      - .env
    restart: always

  availability-service:
    container_name: availability-service-container
    build: ./backend/availability-service
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
    env_file:
      - .env
    restart: always

  location-service:
    container_name: location-service-container
    build: ./backend/location-service
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
    env_file:
      - .env
    restart: always

  reputation-service:
    container_name: reputation-service-container
    build: ./backend/reputation-service
    ports:
      - "5006:5006"
    environment:
      - PORT=5006
    env_file:
      - .env
    restart: always

  frontend:
    container_name: frontend-container
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    env_file:
      - .env
    stdin_open: true
    tty: true
    restart: always