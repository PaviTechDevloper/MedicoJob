name: CI Docker Build

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/actions/**"
      - ".github/workflows/ci-docker-build.yaml"
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/actions/**"
      - ".github/workflows/ci-docker-build.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build:
    name: "${{ matrix.service }} docker build"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            path: backend/api-gateway
          - service: user-service
            path: backend/user-service
          - service: job-service
            path: backend/job-service
          - service: matching-service
            path: backend/matching-service
          - service: availability-service
            path: backend/availability-service
          - service: location-service
            path: backend/location-service
          - service: reputation-service
            path: backend/reputation-service
          - service: frontend
            path: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          push: false
          tags: medicojob/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Notify
        if: always()
        uses: ./.github/actions/notification-action
        with:
          service: ${{ matrix.service }} docker build
          status: ${{ job.status }}
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
