name: Reputation Service Pipeline

on:
  workflow_call:

concurrency:
  group: medicojob-reputation-service-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/ci_service_pipeline.yml
    with:
      service_name: reputation-service
      service_path: backend/reputation-service
    secrets: inherit
