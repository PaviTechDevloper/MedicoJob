name: Job Service Pipeline

on:
  workflow_call:

concurrency:
  group: medicojob-job-service-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/ci_service_pipeline.yml
    with:
      service_name: job-service
      service_path: backend/job-service
      sonar_project_key: medicojob-job-service
      sonar_token_secret_name: SONAR_TOKEN_JOB_SERVICE
    secrets: inherit
