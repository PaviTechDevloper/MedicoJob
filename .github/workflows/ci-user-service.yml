name: User Service Pipeline

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths:
      - "backend/user-service/**"
      - ".github/**"
  push:
    branches: [main]
    paths:
      - "backend/user-service/**"
      - ".github/**"
  workflow_dispatch:

concurrency:
  group: medicojob-user-service-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/ci_service_pipeline.yml
    with:
      service_name: user-service
      service_path: backend/user-service
      sonar_project_key: ${{ vars.SONAR_PROJECT_KEY_USER_SERVICE || vars.SONAR_PROJECT_KEY }}
    secrets: inherit
