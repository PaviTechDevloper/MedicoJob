name: Matching Service Pipeline

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths:
      - "backend/matching-service/**"
      - ".github/**"
  push:
    branches: [main]
    paths:
      - "backend/matching-service/**"
      - ".github/**"
  workflow_dispatch:

concurrency:
  group: medicojob-matching-service-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/ci_service_pipeline.yml
    with:
      service_name: matching-service
      service_path: backend/matching-service
      sonar_project_key: ${{ vars.SONAR_PROJECT_KEY_MATCHING_SERVICE || vars.SONAR_PROJECT_KEY }}
    secrets: inherit
