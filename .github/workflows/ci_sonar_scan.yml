name: CI Security Gate

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/actions/**"
      - ".github/workflows/ci_sonar_scan.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/actions/**"
      - ".github/workflows/ci_sonar_scan.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: "${{ matrix.service }} sonar"
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            path: backend/api-gateway
          - service: user-service
            path: backend/user-service
          - service: job-service
            path: backend/job-service
          - service: matching-service
            path: backend/matching-service
          - service: availability-service
            path: backend/availability-service
          - service: location-service
            path: backend/location-service
          - service: reputation-service
            path: backend/reputation-service
          - service: frontend
            path: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarCloud scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ matrix.path }}
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ github.repository_owner }}_medicojob-${{ matrix.service }}
            -Dsonar.projectName=medicojob-${{ matrix.service }}
            -Dsonar.sources=.

      - name: Check Sonar quality gate
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: ${{ matrix.path }}/.scannerwork/report-task.txt

      - name: Fail when SonarCloud settings are missing
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_ORGANIZATION == '' }}
        run: |
          echo "SONAR_TOKEN or SONAR_ORGANIZATION is not configured; stopping before Snyk."
          exit 1

      - name: Notify Sonar failure
        if: failure()
        uses: ./.github/actions/notification-action
        with:
          service: ${{ matrix.service }} sonar scan
          status: failed
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          email-to: ${{ secrets.NOTIFICATION_EMAIL_TO }}
          email-from: ${{ secrets.NOTIFICATION_EMAIL_FROM }}
          smtp-server: ${{ secrets.SMTP_SERVER }}
          smtp-port: ${{ secrets.SMTP_PORT || '587' }}
          smtp-username: ${{ secrets.SMTP_USERNAME }}
          smtp-password: ${{ secrets.SMTP_PASSWORD }}

  snyk:
    name: "${{ matrix.service }} snyk"
    runs-on: ubuntu-latest
    needs: sonar
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            path: backend/api-gateway
          - service: user-service
            path: backend/user-service
          - service: job-service
            path: backend/job-service
          - service: matching-service
            path: backend/matching-service
          - service: availability-service
            path: backend/availability-service
          - service: location-service
            path: backend/location-service
          - service: reputation-service
            path: backend/reputation-service
          - service: frontend
            path: frontend

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk test
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          command: test
          args: --file=${{ matrix.path }}/package-lock.json --severity-threshold=high

      - name: Fail when Snyk token is missing
        if: ${{ env.SNYK_TOKEN == '' }}
        run: |
          echo "SNYK_TOKEN is not configured."
          exit 1

      - name: Notify Snyk failure
        if: failure()
        uses: ./.github/actions/notification-action
        with:
          service: ${{ matrix.service }} snyk scan
          status: failed
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          email-to: ${{ secrets.NOTIFICATION_EMAIL_TO }}
          email-from: ${{ secrets.NOTIFICATION_EMAIL_FROM }}
          smtp-server: ${{ secrets.SMTP_SERVER }}
          smtp-port: ${{ secrets.SMTP_PORT || '587' }}
          smtp-username: ${{ secrets.SMTP_USERNAME }}
          smtp-password: ${{ secrets.SMTP_PASSWORD }}
