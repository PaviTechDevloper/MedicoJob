name: Reusable Docker Image Pipeline

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name"
        required: true
        type: string
      service_path:
        description: "Service folder path"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  docker-image:
    name: "${{ inputs.service_name }} docker image"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          service="$(echo '${{ inputs.service_name }}' | tr '[:upper:]' '[:lower:]' | tr '-' '_')"
          image="ghcr.io/${owner}/${owner}.${service}"
          echo "name=${image}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${image}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${image}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service_path }}
          file: ${{ inputs.service_path }}/Dockerfile
          load: true
          push: false
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.latest_tag }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.image.outputs.sha_tag }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ env.GHCR_TOKEN }}

      - name: Push Docker image to GHCR
        shell: bash
        run: |
          docker push "${{ steps.image.outputs.sha_tag }}"
          docker push "${{ steps.image.outputs.latest_tag }}"
