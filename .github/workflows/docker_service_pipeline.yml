name: Reusable Docker Image Pipeline

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name"
        required: true
        type: string
      service_path:
        description: "Service folder path"
        required: true
        type: string
    secrets:
      GHCR_TOKEN:
        description: "GitHub Container Registry token"
        required: true

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  docker-image:
    name: "${{ inputs.service_name }} docker image"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          service="$(echo '${{ inputs.service_name }}' | tr '[:upper:]' '[:lower:]' | tr '-' '_')"
          image="ghcr.io/${owner}/${owner}.${service}"
          echo "name=${image}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${image}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${image}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service_path }}
          file: ${{ inputs.service_path }}/Dockerfile
          load: true
          push: false
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.latest_tag }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.image.outputs.sha_tag }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Push Docker image to GHCR
        shell: bash
        run: |
          docker push "${{ steps.image.outputs.sha_tag }}"
          docker push "${{ steps.image.outputs.latest_tag }}"
