name: Medicojob Pipeline

on:
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: medicojob-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  get-email:
    runs-on: ubuntu-latest
    outputs:
      email: ${{ steps.author.outputs.email }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: author
        shell: bash
        run: |
          SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          EMAIL=$(git show -s --format='%ae' "$SHA" || echo "")
          echo "email=$EMAIL" >> "$GITHUB_OUTPUT"

  sonar-scan:
    uses: ./.github/workflows/ci_sonar_scan.yml
    secrets: inherit

  snyk-scan:
    needs: sonar-scan
    if: ${{ needs.sonar-scan.outputs.quality_gate_status == 'PASSED' }}
    uses: ./.github/workflows/ci_snyk_scan.yml
    secrets: inherit

  notify:
    needs:
      - sonar-scan
      - snyk-scan
      - get-email
    if: ${{ always() && (needs.sonar-scan.result == 'failure' || needs.sonar-scan.outputs.quality_gate_status == 'FAILED' || needs.snyk-scan.outputs.snyk_status == 'failure') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sonar mail notification
        if: ${{ needs.sonar-scan.result == 'failure' || needs.sonar-scan.outputs.quality_gate_status == 'FAILED' }}
        uses: ./.github/actions/notification-action
        with:
          pipeline_name: ${{ github.workflow }}
          repository_name: ${{ github.repository }}
          failure_reason: ${{ needs.sonar-scan.outputs.notify_summary || 'SonarQube quality gate failed. Snyk scan was skipped.' }}
          author: ${{ github.event.pull_request.user.login || github.actor }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          smtp_server: ${{ secrets.SMTP_SERVER }}
          smtp_port: ${{ secrets.SMTP_PORT || '587' }}
          mail_from: ${{ secrets.MAIL_FROM }}
          mail_to: ${{ secrets.MAIL_TO || needs.get-email.outputs.email }}
          workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          report_url: ${{ secrets.SONAR_HOST_URL || 'https://sonarcloud.io' }}/dashboard?id=${{ secrets.SONAR_PROJECT_KEY }}

      - name: Snyk mail notification
        if: ${{ needs.snyk-scan.outputs.snyk_status == 'failure' }}
        uses: ./.github/actions/notification-action
        with:
          pipeline_name: ${{ github.workflow }}
          repository_name: ${{ github.repository }}
          failure_reason: ${{ needs.snyk-scan.outputs.notify_summary }}
          author: ${{ github.event.pull_request.user.login || github.actor }}
          smtp_username: ${{ secrets.SMTP_USERNAME }}
          smtp_password: ${{ secrets.SMTP_PASSWORD }}
          smtp_server: ${{ secrets.SMTP_SERVER }}
          smtp_port: ${{ secrets.SMTP_PORT || '587' }}
          mail_from: ${{ secrets.MAIL_FROM }}
          mail_to: ${{ secrets.MAIL_TO || needs.get-email.outputs.email }}
          workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          report_url: https://app.snyk.io/org/${{ secrets.SNYK_ORG }}/projects/${{ secrets.SNYK_PROJECT_ID }}
