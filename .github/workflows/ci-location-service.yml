name: Location Service Pipeline

on:
  workflow_call:

concurrency:
  group: medicojob-location-service-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/ci_service_pipeline.yml
    with:
      service_name: location-service
      service_path: backend/location-service
      sonar_project_key: medicojob-location-service
    secrets: inherit
