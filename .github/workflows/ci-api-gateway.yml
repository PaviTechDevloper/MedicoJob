name: API Gateway Pipeline

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
    paths:
      - "backend/api-gateway/**"
      - ".github/**"
  push:
    branches: [main]
    paths:
      - "backend/api-gateway/**"
      - ".github/**"
  workflow_dispatch:

concurrency:
  group: medicojob-api-gateway-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/ci_service_pipeline.yml
    with:
      service_name: api-gateway
      service_path: backend/api-gateway
      sonar_project_key: ${{ vars.SONAR_PROJECT_KEY_API_GATEWAY || vars.SONAR_PROJECT_KEY }}
    secrets: inherit
