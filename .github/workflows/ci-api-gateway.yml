name: API Gateway Pipeline

on:
  workflow_call:

concurrency:
  group: medicojob-api-gateway-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline:
    uses: ./.github/workflows/ci_service_pipeline.yml
    with:
      service_name: api-gateway
      service_path: backend/api-gateway
      sonar_project_key: medicojob-api-gateway
      sonar_token_secret_name: SONAR_TOKEN_API_GATEWAY
    secrets: inherit
