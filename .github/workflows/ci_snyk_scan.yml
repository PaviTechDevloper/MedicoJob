name: CI Snyk Scan

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snyk:
    name: "${{ matrix.service }} snyk"
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            path: backend/api-gateway
          - service: user-service
            path: backend/user-service
          - service: job-service
            path: backend/job-service
          - service: matching-service
            path: backend/matching-service
          - service: availability-service
            path: backend/availability-service
          - service: location-service
            path: backend/location-service
          - service: reputation-service
            path: backend/reputation-service
          - service: frontend
            path: frontend

    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk test
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          command: test
          args: --file=${{ matrix.path }}/package-lock.json --severity-threshold=high

      - name: Skip Snyk test
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN is not configured; skipping Snyk scan."

      - name: Notify
        if: always()
        uses: ./.github/actions/notification-action
        with:
          service: ${{ matrix.service }} snyk scan
          status: ${{ job.status }}
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          email-to: ${{ secrets.NOTIFICATION_EMAIL_TO }}
          email-from: ${{ secrets.NOTIFICATION_EMAIL_FROM }}
          smtp-server: ${{ secrets.SMTP_SERVER }}
          smtp-port: ${{ secrets.SMTP_PORT || '587' }}
          smtp-username: ${{ secrets.SMTP_USERNAME }}
          smtp-password: ${{ secrets.SMTP_PASSWORD }}
