apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: availability-service-route
  namespace: dev
spec:
  parentRefs:
  - name: medicojob-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /availability
    backendRefs:
    - name: availability-service
      port: 5004
