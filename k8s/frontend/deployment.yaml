apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pavi-ns
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: pavithrasambath2003/frontend:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: medicojob-config
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "3000"
        - name: REACT_APP_API_URL
          value: "http://43.205.203.210:32290"
        - name: REACT_APP_SOCKET_URL
          value: "http://43.205.203.210:32290"
