apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: pavi-ns
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: medicojob-user-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5001
        env:
        - name: PORT
          value: "5001"
        envFrom:
        - configMapRef:
            name: medicojob-config
