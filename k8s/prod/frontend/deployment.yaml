apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: prod
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: pavithrasambath2003/frontend:v1
        imagePullPolicy: Always
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 20
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: medicojob-config
        - secretRef:
            name: medicojob-secrets
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "3000"



