apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-service
  namespace: pavi-ns
  labels:
    app: job-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-service
  template:
    metadata:
      labels:
        app: job-service
    spec:
      containers:
      - name: job-service
        image: pavithrasambath2003/job-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5002
        env:
        - name: PORT
          value: "5002"
        envFrom:
        - configMapRef:
            name: medicojob-config
